services:
  rdgen:
    build:
      context: .
    image: rdgen-local:rf
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      GHUSER: ${GHUSER}
      GHBEARER: ${GHBEARER}
      GENURL: ${GENURL}
      ZIP_PASSWORD: ${ZIP_PASSWORD}
      GHBRANCH: ${GHBRANCH:-master}
      PROTOCOL: ${PROTOCOL:-https}
      REPONAME: ${REPONAME:-rdgen}
      SH_SECRET: ${SH_SECRET:-}
      DEBUG: ${DEBUG:-false}
      RD_DEFAULT_LANGUAGE: ${RD_DEFAULT_LANGUAGE:-ru}
      RD_DEFAULT_HOMEPAGE_URL: ${RD_DEFAULT_HOMEPAGE_URL:-https://support.example.ru/rustdesk}
      RD_DEFAULT_DOWNLOAD_URL: ${RD_DEFAULT_DOWNLOAD_URL:-https://downloads.example.ru/rustdesk}
      RD_DEFAULT_COMPANY_NAME: ${RD_DEFAULT_COMPANY_NAME:-RustDesk RU}
      RD_RF_LEGAL_NOTICE: ${RD_RF_LEGAL_NOTICE:-Настоящая сборка предназначена для законного удалённого доступа и должна использоваться в соответствии с применимым законодательством Российской Федерации.}
    ports:
      - "${RDGEN_BIND_IP:-127.0.0.1}:${RDGEN_PORT:-8010}:8000"
    dns:
      - 8.8.8.8
    volumes:
      - ./exe:/opt/rdgen/exe
      - ./png:/opt/rdgen/png
      - ./temp_zips:/opt/rdgen/temp_zips
